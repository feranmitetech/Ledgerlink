<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LedgerLink - Invoice & Payment Tracker</title>
  <script src="https://js.paystack.co/v2/inline.js" defer></script>
  <style>
    :root {
      --ink: #17201c;
      --muted: #65736d;
      --line: #dce5df;
      --soft: #f6f8f5;
      --paper: #ffffff;
      --green: #107c55;
      --green-dark: #0d5f43;
      --indigo: #2f4f9e;
      --amber: #b66a05;
      --red: #b42318;
      --teal-soft: #dff5ed;
      --amber-soft: #fff1cf;
      --red-soft: #ffe4df;
      --shadow: 0 16px 48px rgba(24, 39, 32, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--soft);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      background: #10211a;
      color: #f7fff9;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #1db777;
      color: #072116;
      box-shadow: inset 0 -7px 18px rgba(7, 33, 22, 0.18);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1;
    }

    .brand span {
      display: block;
      color: #a7c8ba;
      font-size: 12px;
      margin-top: 4px;
    }

    .nav {
      display: grid;
      gap: 6px;
    }

    .nav button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      color: #d8ebe1;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 11px;
      text-align: left;
    }

    .nav button.active,
    .nav button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .nav svg,
    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    main {
      min-width: 0;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .title-block h2 {
      margin: 0 0 5px;
      font-size: 25px;
      line-height: 1.15;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--green-dark);
    }

    .btn.ghost {
      background: transparent;
    }

    .btn.icon-only {
      width: 38px;
      padding: 0;
    }

    .btn.small {
      min-height: 32px;
      padding: 0 10px;
      font-size: 13px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metric {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 17px;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
      line-height: 1.1;
    }

    .metric small {
      color: var(--muted);
      margin-top: 9px;
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.1fr);
      background: #10211a;
      color: #fff;
    }

    .auth-brand {
      padding: 42px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
    }

    .auth-brand h1 {
      margin: 18px 0 12px;
      font-size: 42px;
      line-height: 1.05;
    }

    .auth-brand p {
      color: #c5dcd2;
      max-width: 520px;
      line-height: 1.55;
    }

    .auth-form-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--soft);
      color: var(--ink);
    }

    .auth-card {
      width: min(460px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .auth-card h2 {
      margin: 0 0 6px;
      font-size: 23px;
    }

    .auth-card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.45;
    }

    .auth-card form {
      display: grid;
      gap: 13px;
    }

    .auth-switch {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .work-grid {
      grid-template-columns: minmax(0, 1.65fr) minmax(320px, 0.9fr);
      align-items: start;
      margin-top: 16px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-header p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .panel-body {
      padding: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 13px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status.paid {
      background: var(--teal-soft);
      color: var(--green-dark);
    }

    .status.pending {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status.overdue {
      background: var(--red-soft);
      color: var(--red);
    }

    .status.draft {
      background: #e9eef7;
      color: var(--indigo);
    }

    .customer-cell strong {
      display: block;
    }

    .customer-cell span {
      color: var(--muted);
      font-size: 12px;
    }

    .invoice-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: flex-end;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    input::file-selector-button,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 40px;
      padding: 9px 10px;
      outline: none;
    }

    input[type="color"] {
      padding: 4px;
      min-height: 44px;
    }

    input[type="file"] {
      padding: 7px;
    }

    input::file-selector-button {
      width: auto;
      min-height: 28px;
      margin-right: 10px;
      border: 0;
      background: var(--soft);
      color: var(--ink);
      cursor: pointer;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(16, 124, 85, 0.14);
    }

    .full {
      grid-column: 1 / -1;
    }

    .line-items {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 74px 110px 38px;
      gap: 8px;
      align-items: center;
    }

    .totals {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      background: var(--soft);
      margin-top: 12px;
      font-size: 14px;
    }

    .totals div {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .totals strong {
      font-size: 18px;
    }

    .brand-settings {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: var(--soft);
    }

    .logo-preview {
      width: 112px;
      height: 112px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 10px;
    }

    .logo-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
    }

    .billing-alert {
      margin-bottom: 16px;
      border: 1px solid #f0c36a;
      background: #fff8e6;
      color: #4d3500;
      border-radius: 8px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .billing-alert strong {
      display: block;
      margin-bottom: 3px;
    }

    .billing-alert span {
      color: #73520c;
      font-size: 13px;
    }

    .settings-stack {
      display: grid;
      gap: 16px;
    }

    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .plan-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 10px;
      background: var(--paper);
    }

    .plan-card.active {
      border-color: var(--green);
      box-shadow: 0 0 0 1px rgba(16, 124, 85, 0.16);
    }

    .plan-card h3,
    .plan-card h4 {
      margin: 0;
    }

    .plan-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .plan-limits {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--ink);
    }

    .key-status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      padding: 0 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .key-status.enabled {
      background: #e5f6ee;
      color: var(--green-dark);
    }

    .key-status.disabled {
      background: #f2f5f3;
      color: var(--muted);
    }

    .reminder-status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .reminder-status-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .reminder-status-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .reminder-list {
      display: grid;
      gap: 10px;
    }

    .reminder {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .reminder-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .reminder strong {
      display: block;
    }

    .reminder span {
      color: var(--muted);
      font-size: 13px;
    }

    .reminder-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
    }

    .tabs button {
      border: 0;
      min-height: 34px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
    }

    .tabs button.active {
      background: var(--green);
      color: #fff;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #10211a;
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transform: translateY(24px);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      z-index: 20;
      max-width: min(380px, calc(100vw - 36px));
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(10, 20, 16, 0.54);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(880px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      background: var(--paper);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .invoice-paper {
      width: min(880px, 100%);
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      --invoice-brand: var(--green);
      --invoice-accent: var(--indigo);
      --invoice-on-brand: #ffffff;
    }

    .public-page {
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: start center;
      background: var(--soft);
    }

    .invoice-head {
      padding: 22px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      background: var(--invoice-brand);
      color: var(--invoice-on-brand);
    }

    .invoice-head h1 {
      margin: 0 0 7px;
      font-size: 25px;
    }

    .invoice-head p,
    .invoice-meta p {
      margin: 0;
      color: color-mix(in srgb, var(--invoice-on-brand) 82%, transparent);
      line-height: 1.5;
    }

    .invoice-brand-block {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .invoice-logo {
      width: 62px;
      height: 62px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
      color: var(--invoice-brand);
      font-weight: 800;
    }

    .invoice-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 6px;
    }

    .invoice-meta {
      text-align: right;
      min-width: 180px;
    }

    .invoice-meta h1 {
      color: var(--invoice-on-brand);
    }

    .invoice-content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .bill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .bill-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
    }

    .bill-box span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .bill-box p {
      margin: 7px 0 0;
      line-height: 1.5;
    }

    .pay-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--invoice-brand) 9%, #ffffff);
      padding: 16px 22px;
      flex-wrap: wrap;
    }

    .pay-strip strong {
      font-size: 22px;
    }

    .invoice-paper .btn.primary {
      border-color: var(--invoice-brand);
      background: var(--invoice-brand);
      color: var(--invoice-on-brand);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metrics,
      .work-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      main,
      .public-page {
        padding: 14px;
      }

      .topbar,
      .invoice-head,
      .pay-strip,
      .bill-grid,
      .auth-page {
        display: grid;
        grid-template-columns: 1fr;
      }

      .auth-brand,
      .auth-form-wrap {
        min-height: auto;
        padding: 22px;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .btn {
        flex: 1 1 auto;
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid,
      .item-row {
        grid-template-columns: 1fr;
      }

      .item-row .icon-only {
        width: 100%;
      }

      .invoice-meta {
        text-align: left;
      }
    }

    @media print {
      * {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      body {
        background: #fff;
      }

      .sidebar,
      .topbar,
      .pay-strip,
      .modal .panel-header,
      .no-print {
        display: none !important;
      }

      .app-shell {
        display: block;
      }

      main,
      .public-page {
        padding: 0;
      }

      .invoice-paper {
        border: 0;
        box-shadow: none;
      }

      .invoice-head {
        background: var(--invoice-brand) !important;
        color: var(--invoice-on-brand) !important;
      }

      .invoice-meta h1 {
        color: var(--invoice-on-brand) !important;
      }

      .invoice-logo {
        background: #ffffff !important;
        color: var(--invoice-brand) !important;
      }

      .status.paid {
        background: var(--teal-soft) !important;
        color: var(--green-dark) !important;
      }

      .status.pending {
        background: var(--amber-soft) !important;
        color: var(--amber) !important;
      }

      .status.overdue {
        background: var(--red-soft) !important;
        color: var(--red) !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="toast" id="toast"></div>

  <template id="icon-template">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d=""></path>
    </svg>
  </template>

  <script>
    const STORAGE_KEY = "ledgerlink.ng.v1";
    const root = document.querySelector("#root");
    const toastEl = document.querySelector("#toast");
    const today = new Date();
    const canUseBackend = location.protocol === "http:" || location.protocol === "https:";
    let activeView = "dashboard";
    let statusFilter = "all";
    let backendReady = false;
    let authChecked = !canUseBackend;
    let backendError = "";
    let currentUser = null;
    let authMode = "login";
    let publicInvoiceCache = {};
    let verifiedReference = "";
    let verifiedBillingReference = "";
    let verifiedAddonReference = "";
    let saveTimer = null;

    function dateOffset(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(seedState);
      try {
        return normalizeState(JSON.parse(saved));
      } catch {
        return structuredClone(seedState);
      }
    }

    function normalizeState(value) {
      const mergedSettings = { ...seedState.settings, ...(value?.settings || {}) };
      mergedSettings.automatedReminderChannels = {
        ...seedState.settings.automatedReminderChannels,
        ...(value?.settings?.automatedReminderChannels || {})
      };
      return {
        ...structuredClone(seedState),
        ...value,
        settings: mergedSettings,
        paystack: { ...seedState.paystack, ...(value?.paystack || {}) },
        billing: { ...seedState.billing, ...(value?.billing || {}) },
        billingPlans: Array.isArray(value?.billingPlans) && value.billingPlans.length ? value.billingPlans : seedState.billingPlans,
        billingAddons: Array.isArray(value?.billingAddons) && value.billingAddons.length ? value.billingAddons : seedState.billingAddons,
        invoices: Array.isArray(value?.invoices)
          ? value.invoices.map(invoice => ({ ...invoice, publicId: invoice.publicId || newPublicId() }))
          : []
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      queueBackendSave();
    }

    async function saveStateNow() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (!backendReady || (canUseBackend && !currentUser)) return state;
      const response = await fetch("/api/state", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(state)
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        if (response.status === 404) {
          throw new Error("The running server is older. Restart with the latest server.js.");
        }
        throw new Error(payload.error || "Could not sync changes to the backend.");
      }
      state = normalizeState(payload);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      return state;
    }

    async function hydrateFromBackend() {
      if (!canUseBackend) return;
      try {
        const response = await fetch("/api/session");
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error("The server on this port is an older backend. Restart with the latest server.js that includes /api/session.");
          }
          throw new Error(`Session check failed with HTTP ${response.status}.`);
        }
        const payload = await response.json();
        backendReady = true;
        backendError = "";
        authChecked = true;
        currentUser = payload.authenticated ? payload.user : null;
        if (payload.state) {
          state = normalizeState(payload.state);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        render();
      } catch (error) {
        backendReady = false;
        backendError = error.message || "Could not reach the backend.";
        authChecked = true;
        render();
      }
    }

    function queueBackendSave() {
      if (!backendReady || (canUseBackend && !currentUser)) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveStateNow().catch(() => {
          backendReady = false;
          showToast("Backend sync paused. Changes are saved in this browser.");
        });
      }, 200);
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-NG", {
        style: "currency",
        currency: "NGN",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("en-NG", { day: "2-digit", month: "short", year: "numeric" }).format(new Date(value));
    }

    function invoiceSubtotal(invoice) {
      return invoice.items.reduce((sum, item) => sum + Number(item.quantity || 0) * Number(item.price || 0), 0);
    }

    function invoiceVat(invoice) {
      return invoiceSubtotal(invoice) * (Number(state.settings.vatRate || 0) / 100);
    }

    function invoiceTotal(invoice) {
      return invoiceSubtotal(invoice) + invoiceVat(invoice);
    }

    function invoiceVatWithSettings(invoice, settings) {
      return invoiceSubtotal(invoice) * (Number(settings.vatRate || 0) / 100);
    }

    function invoiceTotalWithSettings(invoice, settings) {
      return invoiceSubtotal(invoice) + invoiceVatWithSettings(invoice, settings);
    }

    function effectiveStatus(invoice) {
      if (invoice.status === "paid" || invoice.status === "draft") return invoice.status;
      return new Date(invoice.dueDate + "T23:59:59") < today ? "overdue" : "pending";
    }

    function daysBetween(dateValue) {
      const target = new Date(dateValue + "T00:00:00");
      const start = new Date(today.toISOString().slice(0, 10) + "T00:00:00");
      return Math.round((target - start) / 86400000);
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    function shareUrl(invoice) {
      return `${location.origin}${location.pathname}#pay/${invoice.publicId || invoice.id}`;
    }

    function reminderMessage(invoice) {
      const total = formatMoney(invoiceTotal(invoice));
      const status = effectiveStatus(invoice);
      if (status === "overdue") {
        return `Hello ${invoice.customer}, this is a friendly reminder that invoice ${invoice.id} for ${total} was due on ${formatDate(invoice.dueDate)}. You can pay here: ${shareUrl(invoice)}`;
      }
      return `Hello ${invoice.customer}, invoice ${invoice.id} for ${total} is due on ${formatDate(invoice.dueDate)}. You can review and pay here: ${shareUrl(invoice)}`;
    }

    function getReminderQueue() {
      const before = Number(state.settings.reminderBeforeDays || 0);
      const after = Number(state.settings.reminderAfterDays || 0);
      return state.invoices
        .filter(invoice => effectiveStatus(invoice) !== "paid" && effectiveStatus(invoice) !== "draft")
        .map(invoice => {
          const dueIn = daysBetween(invoice.dueDate);
          const shouldSend = dueIn >= 0 ? dueIn <= before : Math.abs(dueIn) >= after;
          return { invoice, dueIn, shouldSend };
        })
        .filter(row => row.shouldSend)
        .sort((a, b) => a.dueIn - b.dueIn);
    }

    function automatedReminderStatus() {
      const enabled = state.settings.automatedRemindersEnabled === true;
      const before = Number(state.settings.reminderBeforeDays || 0);
      const after = Number(state.settings.reminderAfterDays || 0);
      const channels = [];
      if (state.settings.automatedReminderChannels?.email !== false) channels.push("email");
      if (state.settings.automatedReminderChannels?.whatsapp && Number(state.billing?.limits?.whatsapp || 0) > 0) channels.push("WhatsApp");
      const channelText = channels.length ? channels.join(" and ") : "no delivery channels";
      return {
        enabled,
        label: enabled ? "Automated reminders ON" : "Automated reminders OFF",
        detail: enabled
          ? `LedgerLink will send ${channelText} reminders from ${before} day${before === 1 ? "" : "s"} before due date and ${after} day${after === 1 ? "" : "s"} after due date.`
          : "LedgerLink will not send reminders automatically. You can still send reminders manually from this page."
      };
    }

    async function submitAuth(event) {
      event.preventDefault();
      const form = Object.fromEntries(new FormData(event.currentTarget).entries());
      const endpoint = authMode === "register" ? "/api/auth/register" : "/api/auth/login";
      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(form)
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Authentication failed.");
        currentUser = payload.user;
        state = normalizeState(payload.state);
        backendReady = true;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        showToast(authMode === "register" ? "Account created." : "Signed in.");
        render();
      } catch (error) {
        showToast(error.message);
      }
    }

    function getMetrics() {
      const month = today.toISOString().slice(0, 7);
      return state.invoices.reduce((acc, invoice) => {
        const status = effectiveStatus(invoice);
        const total = invoiceTotal(invoice);
        if (status !== "paid" && status !== "draft") {
          acc.outstanding += total;
          acc.pendingCount += 1;
        }
        if (status === "overdue") {
          acc.overdue += total;
          acc.overdueCount += 1;
        }
        if (status === "paid") {
          acc.paidCount += 1;
          if ((invoice.paidAt || "").slice(0, 7) === month) acc.paidMonth += total;
        }
        return acc;
      }, { outstanding: 0, overdue: 0, paidMonth: 0, pendingCount: 0, overdueCount: 0, paidCount: 0 });
    }

    async function verifyReturnedPayment(invoiceId) {
      const reference = paymentReferenceFromUrl();
      if (!reference || reference === verifiedReference || !canUseBackend) return;
      verifiedReference = reference;
      try {
        const response = await fetch(`/paystack/verify?reference=${encodeURIComponent(reference)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Payment verification failed.");
        publicInvoiceCache[invoiceId] = null;
        showToast("Payment verified.");
        fetchPublicInvoice(invoiceId);
      } catch (error) {
        showToast(error.message);
      }
    }

    function paymentReferenceFromUrl() {
      const searchRef = new URLSearchParams(location.search).get("reference");
      if (searchRef) return searchRef;
      const hashQuery = location.hash.includes("?") ? location.hash.split("?")[1] : "";
      return new URLSearchParams(hashQuery).get("reference") || new URLSearchParams(hashQuery).get("trxref") || "";
    }

    async function fetchPublicInvoice(id) {
      if (!canUseBackend || publicInvoiceCache[id]) {
        root.innerHTML = `<div class="public-page"><div class="invoice-paper"><div class="empty">Invoice not found.</div></div></div>`;
        return;
      }
      try {
        const response = await fetch(`/api/public/invoices/${encodeURIComponent(id)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Invoice not found.");
        publicInvoiceCache[id] = payload;
        renderPublicInvoice(id);
      } catch (error) {
        root.innerHTML = `<div class="public-page"><div class="invoice-paper"><div class="empty">${escapeHtml(error.message)}</div></div></div>`;
      }
    }

    function invoiceStyleVars(settings = state.settings) {
      const brandColor = validColor(settings.brandColor, "#107c55");
      const accentColor = validColor(settings.accentColor, "#2f4f9e");
      const onBrand = readableTextColor(brandColor);
      return `--invoice-brand: ${brandColor}; --invoice-accent: ${accentColor}; --invoice-on-brand: ${onBrand};`;
    }

    function validColor(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(String(value || "")) ? value : fallback;
    }

    function readableTextColor(hex) {
      const color = hex.replace("#", "");
      const r = parseInt(color.slice(0, 2), 16);
      const g = parseInt(color.slice(2, 4), 16);
      const b = parseInt(color.slice(4, 6), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#17201c" : "#ffffff";
    }

    function businessInitials(name) {
      const initials = String(name || "LL")
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map(word => word[0]?.toUpperCase() || "")
        .join("");
      return initials || "LL";
    }

    }

    function closeInvoiceModal() {
      document.querySelector("#invoiceModal").classList.remove("open");
    }

    function addLineItem(description = "", quantity = 1, price = 0) {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <input name="description" placeholder="Description" required value="${escapeAttr(description)}">
        <input name="quantity" type="number" min="1" step="1" required value="${escapeAttr(quantity)}">
        <input name="price" type="number" min="0" step="100" required value="${escapeAttr(price)}">
        <button class="btn icon-only" type="button" title="Remove item">${icons.trash}</button>
      `;
      row.querySelectorAll("input").forEach(input => input.addEventListener("input", updateInvoiceTotals));
      row.querySelector("button").addEventListener("click", () => {
        if (document.querySelectorAll(".item-row").length > 1) row.remove();
        updateInvoiceTotals();
      });
      document.querySelector("#lineItems").appendChild(row);
    }

    function updateInvoiceTotals() {
      const items = readLineItems();
      const subtotal = items.reduce((sum, item) => sum + Number(item.quantity || 0) * Number(item.price || 0), 0);
      const vat = subtotal * (Number(state.settings.vatRate || 0) / 100);
      document.querySelector("#invoiceTotals").innerHTML = `
        <div><span>Subtotal</span><span>${formatMoney(subtotal)}</span></div>
        <div><span>VAT (${state.settings.vatRate}%)</span><span>${formatMoney(vat)}</span></div>
        <div><strong>Total</strong><strong>${formatMoney(subtotal + vat)}</strong></div>
      `;
    }

    function readLineItems() {
      return [...document.querySelectorAll(".item-row")].map(row => ({
        description: row.querySelector("[name='description']").value.trim(),
        quantity: Number(row.querySelector("[name='quantity']").value || 0),
        price: Number(row.querySelector("[name='price']").value || 0)
      })).filter(item => item.description);
    }

    async function createInvoice(event) {
      event.preventDefault();
      if (!canCreateInvoice()) return;
      const form = new FormData(event.currentTarget);
      const items = readLineItems();
      if (!items.length) {
        showToast("Add at least one line item.");
        return;
      }
      const invoice = {
        id: nextInvoiceId(),
        publicId: newPublicId(),
        customer: form.get("customer").trim(),
        email: form.get("email").trim(),
        phone: form.get("phone").trim(),
        issueDate: form.get("issueDate"),
        dueDate: form.get("dueDate"),
        status: form.get("status"),
        notes: form.get("notes").trim(),
        items,
        reminders: []
      };
      if (invoice.status === "paid") invoice.paidAt = dateOffset(0);
      state.invoices.unshift(invoice);
      try {
        await saveStateNow();
        closeInvoiceModal();
        copyInvoiceLink(invoice.id);
        activeView = "invoices";
        render();
      } catch (error) {
        state.invoices = state.invoices.filter(item => item.publicId !== invoice.publicId);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        showToast(error.message);
      }
    }

    function canCreateInvoice() {
      if (!backendReady || state.billing?.active !== false) return true;
      showToast("Renew your LedgerLink plan before creating new invoices.");
      return false;
    }

    function nextInvoiceId() {
      const max = state.invoices.reduce((num, invoice) => {
        const match = String(invoice.id || "").match(/^INV-(\d{1,3})$/i);
        return Math.max(num, match ? Number(match[1]) : 0);
      }, 0);
      return `INV-${String(max + 1).padStart(3, "0")}`;
    }

    function newPublicId() {
      if (crypto.randomUUID) return `inv_${crypto.randomUUID().replace(/-/g, "")}`;
      return `inv_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function saveSettings(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const previousLogo = state.settings.logoDataUrl || "";
      const settingsFields = Object.fromEntries(form.entries());
      delete settingsFields.reminderEmailChannel;
      delete settingsFields.reminderWhatsappChannel;
      state.settings = {
        ...state.settings,
        ...settingsFields,
        logoDataUrl: previousLogo,
        automatedRemindersEnabled: form.get("automatedRemindersEnabled") === "on",
        automatedReminderChannels: {
          email: form.get("reminderEmailChannel") === "on",
          whatsapp: form.get("reminderWhatsappChannel") === "on"
        }
      };
      state.settings.vatRate = Number(state.settings.vatRate || 0);
      state.settings.reminderBeforeDays = Number(state.settings.reminderBeforeDays || 0);
      state.settings.reminderAfterDays = Number(state.settings.reminderAfterDays || 0);
      saveState();
      showToast("Settings saved.");
      render();
    }

    async function savePaystackKey() {
      const input = document.querySelector("#merchantPaystackKey");
      const secretKey = input?.value.trim();
      if (!secretKey) {
        showToast("Enter the business Paystack secret key first.");
        return;
      }
      try {
        const response = await fetch("/api/business/paystack", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ secretKey })
        });
        const payload = await response.json();
        if (response.status === 404) throw new Error("The running server is older. Restart with the latest server.js.");
        if (!response.ok) throw new Error(payload.error || "Could not save Paystack key.");
        state.paystack = payload.paystack;
        input.value = "";
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        showToast("Paystack key saved securely.");
        render();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function startBillingPayment(planId = "email") {
      if (!backendReady) {
        showToast("Start the backend before renewing a plan.");
        return;
      }
      try {
        const response = await fetch("/api/billing/initialize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ planId })
        });
        const payload = await response.json();
        if (response.status === 404) throw new Error("The running server is older. Restart with the latest server.js.");
        if (!response.ok) throw new Error(payload.error || "Could not start renewal payment.");
        const accessCode = payload.access_code || payload.accessCode || payload.data?.access_code;
        if (!accessCode) throw new Error("No Paystack access code returned.");
        if (!window.PaystackPop) throw new Error("Paystack Popup script is not available.");
        const popup = new PaystackPop();
        popup.resumeTransaction(accessCode);
      } catch (error) {
        showToast(error.message);
      }
    }

    async function startAddonPayment(addonId) {
      if (!backendReady) {
        showToast("Start the backend before buying an add-on.");
        return;
      }
      if (!state.billing?.active) {
        showToast("Activate a LedgerLink plan before buying add-ons.");
        return;
      }
      try {
        const response = await fetch("/api/billing/addons/initialize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ addonId })
        });
        const payload = await response.json();
        if (response.status === 404) throw new Error("The running server is older. Restart with the latest server.js.");
        if (!response.ok) throw new Error(payload.error || "Could not start add-on payment.");
        const accessCode = payload.access_code || payload.accessCode || payload.data?.access_code;
        if (!accessCode) throw new Error("No Paystack access code returned.");
        if (!window.PaystackPop) throw new Error("Paystack Popup script is not available.");
        const popup = new PaystackPop();
        popup.resumeTransaction(accessCode);
      } catch (error) {
        showToast(error.message);
      }
    }

    async function verifyReturnedBillingPayment() {
      const params = new URLSearchParams(location.search);
      const reference = params.get("billing") === "return" ? (params.get("reference") || params.get("trxref") || "") : "";
      if (!reference || reference === verifiedBillingReference || !backendReady || !currentUser) return;
      verifiedBillingReference = reference;
      try {
        const response = await fetch(`/api/billing/verify?reference=${encodeURIComponent(reference)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Billing verification failed.");
        if (payload.billing) state.billing = payload.billing;
        if (payload.billingPlans) state.billingPlans = payload.billingPlans;
        if (payload.billingAddons) state.billingAddons = payload.billingAddons;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        history.replaceState(null, "", `${location.pathname}${location.hash}`);
        showToast("LedgerLink plan renewed.");
        hydrateFromBackend();
      } catch (error) {
        showToast(error.message);
      }
    }

    async function verifyReturnedAddonPayment() {
      const params = new URLSearchParams(location.search);
      const reference = params.get("addon") === "return" ? (params.get("reference") || params.get("trxref") || "") : "";
      if (!reference || reference === verifiedAddonReference || !backendReady || !currentUser) return;
      verifiedAddonReference = reference;
      try {
        const response = await fetch(`/api/billing/addons/verify?reference=${encodeURIComponent(reference)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Add-on verification failed.");
        if (payload.billing) state.billing = payload.billing;
        if (payload.billingPlans) state.billingPlans = payload.billingPlans;
        if (payload.billingAddons) state.billingAddons = payload.billingAddons;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        history.replaceState(null, "", `${location.pathname}${location.hash}`);
        showToast("Reminder add-on activated.");
        hydrateFromBackend();
      } catch (error) {
        showToast(error.message);
      }
    }

    function handleLogoUpload(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      if (file.size > 700000) {
        showToast("Logo is too large. Use an image under 700 KB.");
        event.target.value = "";
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        state.settings.logoDataUrl = reader.result;
        saveState();
        showToast("Logo uploaded.");
        render();
      };
      reader.readAsDataURL(file);
    }

    function removeLogo() {
      state.settings.logoDataUrl = "";
      saveState();
      showToast("Logo removed.");
      render();
    }

    function previewInvoice(id) {
      const invoice = state.invoices.find(item => item.id === id || item.publicId === id);
      const modal = document.createElement("div");
      modal.className = "modal open";
      modal.innerHTML = `
        <div class="modal-card">
          <div class="panel-header no-print">
            <div>
              <h3>${escapeHtml(invoice.id)}</h3>
              <p>${escapeHtml(invoice.customer)}</p>
            </div>
            <div class="actions">
              <button class="btn" data-print>${icons.print}Print</button>
              <button class="btn" data-copy-link>${icons.copy}Copy link</button>
              <button class="btn primary" data-open-link>${icons.pay}Payment page</button>
              <button class="btn icon-only" data-close title="Close">${icons.trash.replace("<path d=\"M3 6h18M8 6V4h8v2M6 6l1 16h10l1-16\"/>", "<path d=\"M18 6 6 18M6 6l12 12\"/>")}</button>
            </div>
          </div>
          <section class="invoice-paper" style="${invoiceStyleVars()}">${invoiceHtml(invoice)}</section>
        </div>
      `;
      document.body.appendChild(modal);
      modal.querySelector("[data-close]").addEventListener("click", () => modal.remove());
      modal.querySelector("[data-print]").addEventListener("click", () => window.print());
      modal.querySelector("[data-copy-link]").addEventListener("click", () => copyInvoiceLink(id));
      modal.querySelector("[data-open-link]").addEventListener("click", () => {
        modal.remove();
        location.hash = `pay/${id}`;
      });
    }

    function copyInvoiceLink(id) {
      const invoice = state.invoices.find(item => item.id === id || item.publicId === id);
      copyText(shareUrl(invoice));
      showToast(`Payment link copied for ${invoice.id}.`);
    }

    function markPaid(id) {
      const invoice = state.invoices.find(item => item.id === id);
      invoice.status = "paid";
      invoice.paidAt = dateOffset(0);
      saveState();
      showToast(`${invoice.id} marked as paid.`);
      render();
    }

    async function payInvoice(id) {
      const invoice = state.invoices.find(item => item.id === id || item.publicId === id) || publicInvoiceCache[id]?.invoice;
      const paystackStatus = publicInvoiceCache[id]?.paystack || state.paystack || {};
      if (!paystackStatus.configured) {
        showToast("Paystack secret key not set for this business.");
        return;
      }
      const endpoint = backendReady ? "/paystack/initialize" : "";
      if (!endpoint) {
        markPaid(id);
        showToast("Demo payment complete. Start the backend for live Paystack.");
        location.hash = "";
        return;
      }

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            invoiceId: invoice.id,
            publicId: invoice.publicId || id,
            email: invoice.email,
            amount: Math.round(invoiceTotal(invoice) * 100),
            currency: "NGN",
            metadata: { customer: invoice.customer, invoiceId: invoice.id }
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Payment initialization failed.");
        const accessCode = payload.access_code || payload.accessCode || payload.data?.access_code;
        if (!accessCode) throw new Error("No Paystack access code returned.");
        if (!window.PaystackPop) throw new Error("Paystack Popup script is not available.");
        const popup = new PaystackPop();
        popup.resumeTransaction(accessCode);
      } catch (error) {
        showToast(error.message);
      }
    }

    function copyReminder(id) {
      const invoice = state.invoices.find(item => item.id === id);
      copyText(reminderMessage(invoice));
      recordReminder(invoice, "Copy");
      showToast("Reminder copied.");
    }

    function sendEmail(id) {
      const invoice = state.invoices.find(item => item.id === id);
      recordReminder(invoice, "Email");
      openEmailCompose({
        to: invoice.email,
        subject: `Payment reminder for ${invoice.id}`,
        body: reminderMessage(invoice)
      });
      saveState();
      render();
    }

    function sendWhatsApp(id) {
      const invoice = state.invoices.find(item => item.id === id);
      recordReminder(invoice, "WhatsApp");
      const phone = invoice.phone.replace(/[^\d]/g, "");
      const text = encodeURIComponent(reminderMessage(invoice));
      window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
      saveState();
      render();
    }

    function recordReminder(invoice, channel) {
      invoice.reminders = invoice.reminders || [];
      invoice.reminders.push({ date: dateOffset(0), channel });
      saveState();
    }

    function copyAllReminders() {
      const text = getReminderQueue().map(row => reminderMessage(row.invoice)).join("\n\n");
      if (!text) {
        showToast("No reminders to copy.");
        return;
      }
      copyText(text);
      showToast("Reminder batch copied.");
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        return;
      }
      fallbackCopy(text);
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function sendBatchEmail() {
      const queue = getReminderQueue();
      if (!queue.length) {
        showToast("No reminders to send.");
        return;
      }
      openEmailCompose({
        bcc: queue.map(row => row.invoice.email).join(","),
        subject: "Payment reminders",
        body: queue.map(row => reminderMessage(row.invoice)).join("\n\n")
      });
    }

    function openEmailCompose({ to = "", bcc = "", subject = "", body = "" }) {
      const params = new URLSearchParams({
        view: "cm",
        fs: "1",
        to,
        bcc,
        su: subject,
        body
      });
      const gmailUrl = `https://mail.google.com/mail/?${params.toString()}`;
      const mailtoParts = [];
      if (bcc) mailtoParts.push(`bcc=${encodeURIComponent(bcc)}`);
      mailtoParts.push(`subject=${encodeURIComponent(subject)}`);
      mailtoParts.push(`body=${encodeURIComponent(body)}`);
      const mailtoUrl = `mailto:${encodeURIComponent(to)}?${mailtoParts.join("&")}`;
      const opened = window.open(gmailUrl, "_blank", "noopener");
      if (!opened) location.href = mailtoUrl;
    }

    function exportCsv() {
      const rows = [
        ["Invoice", "Customer", "Email", "Due date", "Status", "Amount"],
        ...state.invoices.map(invoice => [invoice.id, invoice.customer, invoice.email, invoice.dueDate, effectiveStatus(invoice), invoiceTotal(invoice)])
      ];
      const csv = rows.map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "ledgerlink-invoices.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    window.addEventListener("hashchange", render);
    render();
    hydrateFromBackend();
  </script>
</body>
</html>
